<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewYorker in France</title>
    <style>
      :root {
        --bg: #030303;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(0, 0, 0, 0.28);
        --border: rgba(255, 255, 255, 0.1);
        --text: #f8f8f8;
        --muted: rgba(255, 255, 255, 0.72);
        --soft: rgba(255, 255, 255, 0.52);
        --red: #dc2626;
        --red-bright: #ef4444;
        --red-soft: rgba(239, 68, 68, 0.12);
        --green: #10b981;
        --green-soft: rgba(16, 185, 129, 0.12);
        --radius-xl: 32px;
        --radius-lg: 24px;
        --shadow: 0 0 60px rgba(255, 0, 0, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
        color: var(--text);
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      .app-shell {
        position: relative;
        min-height: 100vh;
        background: radial-gradient(circle at top, #2a0000 0%, #090909 36%, #000 74%);
      }

      .bg-image {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 1;
      }

      .bg-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.68);
      }

      .blur-1,
      .blur-2,
      .blur-3 {
        position: absolute;
        border-radius: 999px;
        filter: blur(90px);
        pointer-events: none;
      }

      .blur-1 {
        left: -80px;
        top: 60px;
        width: 260px;
        height: 260px;
        background: rgba(220, 38, 38, 0.18);
      }

      .blur-2 {
        right: -40px;
        top: 28%;
        width: 300px;
        height: 300px;
        background: rgba(239, 68, 68, 0.12);
      }

      .blur-3 {
        left: 30%;
        bottom: 0;
        width: 320px;
        height: 320px;
        background: rgba(255, 255, 255, 0.04);
      }

      .container {
        position: relative;
        z-index: 1;
        width: min(1120px, calc(100% - 24px));
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 14px 0 22px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 52px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-radius: 24px;
        padding: 12px 16px;
        margin-bottom: 18px;
      }

      .brand {
        font-size: 12px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fca5a5;
        font-weight: 700;
      }

      .score-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        border: 1px solid rgba(248, 113, 113, 0.32);
        background: rgba(239, 68, 68, 0.1);
        color: #fee2e2;
        font-size: 14px;
        font-weight: 600;
      }

      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .panel {
        width: 100%;
        border-radius: var(--radius-xl);
        border: 1px solid var(--border);
        background: var(--panel);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .panel.narrow {
        max-width: 960px;
      }

      .panel.center {
        text-align: center;
      }

      .hero-image-wrap,
      .question-image-wrap {
        width: 100%;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.32);
        margin-bottom: 22px;
      }

      .hero-image,
      .question-image {
        display: block;
        width: 100%;
        height: 280px;
        object-position: center;
      }

      .hero-image {
        object-fit: contain;
        background: rgba(0, 0, 0, 0.7);
      }

      .question-image {
        object-fit: contain;
        background: rgba(0, 0, 0, 0.7);
      }

      .question-image-wrap {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        overflow: visible;
      }

      .question-image {
        width: 100%;
        height: 280px;
        box-sizing: border-box;
        padding: 5%;
        object-fit: contain;
        object-position: center;
        background: #ffffff;
        border: 0;
        border-radius: 0;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        font-size: 12px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: #fca5a5;
        font-weight: 700;
      }

      .title {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .subtitle {
        margin: 12px auto 0;
        max-width: 820px;
        white-space: pre-line;
        color: var(--muted);
        line-height: 1.9;
        font-size: 15px;
      }

      .section-title {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.3rem);
        line-height: 1.04;
        font-weight: 800;
      }

      .section-copy {
        margin: 14px auto 0;
        max-width: 780px;
        color: var(--muted);
        line-height: 1.85;
        font-size: 15px;
      }

      .lesson-block {
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        padding: 20px;
        text-align: left;
      }

      .lesson-grid {
        display: grid;
        gap: 14px;
      }

      .lesson-label {
        margin-bottom: 14px;
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #fca5a5;
        font-weight: 700;
      }

      .mini-label {
        margin-bottom: 6px;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.48);
      }

      .lesson-text {
        margin: 0;
        font-size: clamp(1.2rem, 3vw, 2rem);
        font-weight: 700;
      }

      .lesson-text.fr {
        color: #fecaca;
      }

      .btn-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 22px;
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 18px;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-primary {
        background: var(--red);
        color: white;
        border: 1px solid rgba(248, 113, 113, 0.4);
      }

      .btn-primary:hover {
        background: var(--red-bright);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: white;
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .video-drop {
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        padding: 12px;
      }

      .video-stage {
        aspect-ratio: 16 / 9;
        width: 100%;
        border-radius: 24px;
        border: 1px dashed rgba(248, 113, 113, 0.25);
        background: radial-gradient(circle at top, #2a0000 0%, #0b0b0b 55%, #050505 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .video-stage video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .video-placeholder {
        text-align: center;
        padding: 24px;
      }

      .video-placeholder h3 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .video-placeholder p {
        margin: 0;
        max-width: 540px;
        color: var(--soft);
        line-height: 1.7;
        font-size: 14px;
      }

      .question-timer {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 18px auto 0;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(248, 113, 113, 0.32);
        background: rgba(239, 68, 68, 0.12);
        color: #fee2e2;
        font-size: 14px;
        font-weight: 800;
      }

      .question-form {
        max-width: 760px;
        margin: 22px auto 0;
      }

      .answer-input {
        width: 100%;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        padding: 16px 18px;
        font-size: 16px;
        outline: none;
      }

      .answer-input::placeholder {
        color: rgba(255, 255, 255, 0.34);
      }

      .answer-input:focus {
        border-color: rgba(248, 113, 113, 0.45);
      }

      .result-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
      }

      .result-pill.success {
        border: 1px solid rgba(16, 185, 129, 0.25);
        background: var(--green-soft);
        color: #d1fae5;
      }

      .result-pill.fail {
        border: 1px solid rgba(248, 113, 113, 0.25);
        background: var(--red-soft);
        color: #fecaca;
      }

      .answer-box {
        max-width: 760px;
        margin: 20px auto 0;
        text-align: left;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.3);
        padding: 18px;
      }

      .answer-box .answer-heading {
        margin-bottom: 10px;
        font-size: 12px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fca5a5;
        font-weight: 700;
      }

      .answer-box .answer-main {
        margin: 0;
        font-size: clamp(1.4rem, 4vw, 2.4rem);
        font-weight: 800;
        color: #fee2e2;
      }

      .answer-box .answer-alt {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
      }

      .hidden-input {
        display: none;
      }

      @media (min-width: 640px) {
        .container {
          width: min(1120px, calc(100% - 40px));
          padding-top: 18px;
          padding-bottom: 28px;
        }

        .panel {
          padding: 30px;
        }

        .hero-image,
        .question-image {
          height: 360px;
        }

        .hero-image {
          height: 320px;
        }

        .btn-row.two-col {
          grid-template-columns: 1fr 1fr;
          display: grid;
        }
      }

      @media (min-width: 900px) {
        .hero-image,
        .question-image {
          height: 430px;
        }

        .hero-image {
          height: 360px;
        }
      }

      /* Scenario images: no separate outer rectangle.
         The only white area is the 5% padding attached directly to the image. */
      .question-image-wrap {
        display: block;
        width: 100%;
        background: transparent !important;
        border: 0 !important;
        border-radius: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
        text-align: center;
      }

      .question-image {
        display: inline-block;
        width: auto;
        max-width: 100%;
        height: clamp(550px, 120vh, 1300px) !important;
        max-height: none;
        padding: 5%;
        box-sizing: border-box;
        object-fit: contain;
        object-position: center;
        background: #ffffff;
        border: 0;
        border-radius: 0;
      }
    </style>
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <div class="bg-image" id="bgImage"></div>
      <div class="bg-overlay"></div>
      <div class="blur-1"></div>
      <div class="blur-2"></div>
      <div class="blur-3"></div>

      <div class="container">
        <div class="topbar">
          <div class="brand">French Survival Game</div>
          <div class="score-pill" id="scorePill" style="display: none">0/0 correct</div>
        </div>
        <main class="main" id="screen"></main>
      </div>
    </div>

    <script>
      const startupDescription = `You are a NewYorker stranded in Paris, France. Sometimes bad situations arise.
You have to learn French in order to save people from a horrible, horrible death. Or sometimes just avoid weird situations.
At the end of this game, you are expected to learn how to speak French like a Pro, or at least know how to order a Croissant without using your hands.`;
      const BASE = "https://cdn.jsdelivr.net/gh/davidparaschiv/newyorkerinparis/";
      let allScenarios = [];
      let scenarios = [];

      const state = {
        stage: "startup",
        scenarioIndex: 0,
        answeredCount: 0,
        correctCount: 0,
        answerInput: "",
        lastAnswerCorrect: false,
        videoUrl: "",
        timerId: null,
        timeLeft: 30,
        dataLoaded: false,
        dataError: "",
        lessonOrder: [],
      };

      const appShell = document.getElementById("appShell");
      const bgImage = document.getElementById("bgImage");
      const scorePill = document.getElementById("scorePill");
      const screen = document.getElementById("screen");

      function normalizeFrench(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[’]/g, "'")
          .replace(/[^a-zA-Z0-9']/g, "")
          .toLowerCase();
      }

      function isCorrectAnswer(value, expectedAnswer) {
        return normalizeFrench(value) === normalizeFrench(expectedAnswer);
      }

      function formatWithFrenchCharacters(value, expectedAnswer) {
        const expectedChars = Array.from(String(expectedAnswer || "")).filter((char) => normalizeFrench(char));
        let expectedIndex = 0;

        return Array.from(String(value || "")).map((char) => {
          const normalizedChar = normalizeFrench(char);
          if (!normalizedChar) return char;

          const expectedChar = expectedChars[expectedIndex];
          if (expectedChar && normalizedChar === normalizeFrench(expectedChar)) {
            expectedIndex += 1;
            return expectedChar;
          }

          return char;
        }).join("");
      }

      function getCurrentScenario() {
        return scenarios[state.scenarioIndex] || null;
      }

      function getCorrectAnswer(scenario) {
        return scenario.fOk;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function imageUrl(path) {
        return BASE + path;
      }

      function secureRandomInt(maxExclusive) {
        if (!Number.isInteger(maxExclusive) || maxExclusive <= 0) {
          throw new Error("maxExclusive must be a positive integer.");
        }

        const range = 0x100000000;
        const rejectionLimit = Math.floor(range / maxExclusive) * maxExclusive;
        const values = new Uint32Array(1);

        do {
          crypto.getRandomValues(values);
        } while (values[0] >= rejectionLimit);

        return values[0] % maxExclusive;
      }

      function secureShuffle(items) {
        const shuffled = [...items];

        for (let index = shuffled.length - 1; index > 0; index -= 1) {
          const randomIndex = secureRandomInt(index + 1);
          [shuffled[index], shuffled[randomIndex]] = [
            shuffled[randomIndex],
            shuffled[index],
          ];
        }

        return shuffled;
      }

      function randomLessonOrder() {
        return secureRandomInt(2) === 0 ? ["ok", "bad"] : ["bad", "ok"];
      }

      function resetLessonOrder() {
        state.lessonOrder = randomLessonOrder();
      }

      function setBackground() {
        if (state.stage === "startup") {
          bgImage.style.backgroundImage = "url('main.png')";
          bgImage.style.opacity = "1";
        } else {
          bgImage.style.backgroundImage = "none";
          bgImage.style.opacity = "0";
        }
      }

      function updateScore() {
        const showScore = state.stage !== "startup";
        scorePill.style.display = showScore ? "inline-flex" : "none";
        scorePill.textContent = `${state.correctCount}/${state.answeredCount} correct`;
      }

      function nextScenario() {
        stopQuestionTimer();
        state.answerInput = "";
        const nextIndex = state.scenarioIndex + 1;
        if (nextIndex >= scenarios.length) {
          state.stage = "finished";
          render();
          return;
        }
        state.scenarioIndex = nextIndex;
        resetLessonOrder();
        state.stage = "lesson1";
        render();
      }

      function startScenarios() {
        stopQuestionTimer();
        scenarios = secureShuffle(allScenarios);
        state.stage = "lesson1";
        state.scenarioIndex = 0;
        state.answeredCount = 0;
        state.correctCount = 0;
        state.answerInput = "";
        state.lastAnswerCorrect = false;
        resetLessonOrder();
        render();
      }

      function stopQuestionTimer() {
        if (state.timerId !== null) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
      }

      function startQuestionTimer() {
        stopQuestionTimer();
        state.timeLeft = 30;

        const timerValue = document.getElementById("timerValue");
        if (timerValue) {
          timerValue.textContent = state.timeLeft;
        }

        state.timerId = setInterval(() => {
          state.timeLeft -= 1;

          const currentTimerValue = document.getElementById("timerValue");
          if (currentTimerValue) {
            currentTimerValue.textContent = state.timeLeft;
          }

          if (state.timeLeft <= 0) {
            stopQuestionTimer();
            state.answeredCount += 1;
            state.lastAnswerCorrect = false;
            state.stage = "result";
            render();
          }
        }, 1000);
      }

      function submitAnswer() {
        stopQuestionTimer();
        const scenario = getCurrentScenario();
        if (!scenario) return;
        const expectedAnswer = getCorrectAnswer(scenario);
        const isCorrect = isCorrectAnswer(state.answerInput, expectedAnswer);

        state.answeredCount += 1;
        if (isCorrect) state.correctCount += 1;
        state.lastAnswerCorrect = isCorrect;
        state.stage = "result";
        render();
      }

      function loadingScreen() {
        if (state.dataError) {
          return `
            <section class="panel narrow center">
              <div class="eyebrow">Data error</div>
              <h2 class="section-title">Could not load db.json</h2>
              <p class="section-copy">${escapeHtml(state.dataError)}</p>
            </section>
          `;
        }

        return `
          <section class="panel narrow center">
            <div class="eyebrow">Loading</div>
            <h2 class="section-title">Loading scenarios...</h2>
            <p class="section-copy">Reading data from db.json</p>
          </section>
        `;
      }

      function startupScreen() {
        return `
          <section class="panel narrow center">
            <div class="hero-image-wrap">
              <img class="hero-image" src="https://res.cloudinary.com/ubseshqz/image/upload/v1783520829/logo_w58ewo.png" alt="Game logo" />
            </div>
            <p class="subtitle">${escapeHtml(startupDescription)}</p>
            <div class="btn-row" style="justify-content:center; align-items:center;">
              <button class="btn btn-primary" data-action="start-scenarios">Start game</button>
            </div>
          </section>
        `;
      }

      function editorScreen() {
        return `
          <section class="panel narrow center">
            <div class="eyebrow">Video Editor</div>
            <h2 class="section-title">Build the chaos scene</h2>
            <p class="section-copy">
              This screen is intentionally minimal. Upload a local video, preview it here, then continue to the learning scenarios.
            </p>
            <div class="video-drop" style="margin-top:22px;">
              <div class="video-stage">
                ${state.videoUrl
                  ? `<video src="${escapeHtml(state.videoUrl)}" controls></video>`
                  : `<div class="video-placeholder">
                      <h3>No video loaded yet</h3>
                      <p>Upload a local video to preview it here. This works as a simple in-browser editor stage.</p>
                    </div>`}
              </div>
            </div>
            <div class="btn-row two-col">
              <button class="btn btn-secondary" data-action="upload-video">Upload video</button>
              <button class="btn btn-primary" data-action="start-scenarios">Next</button>
            </div>
            <input class="hidden-input" id="videoInput" type="file" accept="video/*" />
          </section>
        `;
      }

      function lessonScreen(number) {
        const scenario = getCurrentScenario();
        const isFirst = number === 1;
        const lessonType = state.lessonOrder[number - 1] || "ok";
        const en = lessonType === "ok" ? scenario.eOk : scenario.eBad;
        const fr = lessonType === "ok" ? scenario.fOk : scenario.fBad;
        const nextAction = isFirst ? "go-lesson2" : "go-question";
        const nextLabel = isFirst ? "Continue" : "Go to question";

        return `
          <section class="panel narrow center">
            <div class="eyebrow">Scenario ${state.scenarioIndex + 1} / ${scenarios.length}</div>
            <h2 class="section-title">${isFirst ? "Lesson 1" : "Lesson 2"}</h2>
            <div class="lesson-block" style="margin-top:22px;">
              <div class="lesson-label">Expression ${number}</div>
              <div class="lesson-grid">
                <div>
                  <div class="mini-label">English</div>
                  <p class="lesson-text">${escapeHtml(en)}</p>
                </div>
                <div>
                  <div class="mini-label">French</div>
                  <p class="lesson-text fr">${escapeHtml(fr)}</p>
                </div>
              </div>
            </div>
            <div class="btn-row" style="justify-content:center; align-items:center;">
              <button class="btn btn-primary" data-action="${nextAction}">${nextLabel}</button>
            </div>
          </section>
        `;
      }

      function questionScreen() {
        const scenario = getCurrentScenario();
        return `
          <section class="panel narrow center">
            <div class="eyebrow">Scenario ${state.scenarioIndex + 1} / ${scenarios.length}</div>
            <div class="question-image-wrap">
              <img class="question-image" src="${escapeHtml(imageUrl(scenario.imgQUrl))}" alt="Question image" />
            </div>
            <h2 class="section-title">What do you say?</h2>
            <div class="question-timer">
              Time left: <span id="timerValue">30</span> seconds
            </div>
            <p class="section-copy">
              Enter the correct French expression exactly as learned earlier, but you can type it without French accents.
            </p>
            <form class="question-form" id="questionForm">
              <input class="answer-input" id="answerInput" type="text" placeholder="Type your answer here" value="${escapeHtml(state.answerInput)}" />
              <div class="btn-row">
                <button class="btn btn-primary" type="submit">Check answer</button>
              </div>
            </form>
          </section>
        `;
      }

      function resultScreen() {
        const scenario = getCurrentScenario();
        const expectedAnswer = getCorrectAnswer(scenario);
        if (state.lastAnswerCorrect) {
          return `
            <section class="panel narrow center">
              <div class="eyebrow">Scenario ${state.scenarioIndex + 1} / ${scenarios.length}</div>
              <div class="question-image-wrap">
                <img class="question-image" src="${escapeHtml(imageUrl(scenario.imgOkUrl))}" alt="Correct image" />
              </div>
              <div class="result-pill success">✓ Correct answer</div>
              <h2 class="section-title" style="margin-top:16px;">You survived this one.</h2>
              <p class="section-copy">
                Nice. You picked the correct phrase and kept the situation under control.
              </p>
              <div class="btn-row" style="justify-content:center; align-items:center;">
                <button class="btn btn-primary" data-action="next-scenario">Next scenario</button>
              </div>
            </section>
          `;
        }

        return `
          <section class="panel narrow center">
            <div class="eyebrow">Scenario ${state.scenarioIndex + 1} / ${scenarios.length}</div>
            <div class="question-image-wrap">
              <img class="question-image" src="${escapeHtml(imageUrl(scenario.imgBadUrl))}" alt="Wrong image" />
            </div>
            <div class="result-pill fail">✕ Wrong answer</div>
            <h2 class="section-title" style="margin-top:16px;">Paris was not impressed.</h2>
            <div class="answer-box">
              <div class="answer-heading">Correct answer</div>
              <p class="answer-main">${escapeHtml(expectedAnswer)}</p>
              <div class="answer-alt">Accent-free accepted version: <strong>${escapeHtml(normalizeFrench(expectedAnswer))}</strong></div>
            </div>
            <div class="btn-row" style="justify-content:center; align-items:center;">
              <button class="btn btn-primary" data-action="next-scenario">Next scenario</button>
            </div>
          </section>
        `;
      }

      function finishedScreen() {
        const endingText =
          state.correctCount === 0
            ? "The New Yorker did not make it through Paris."
            : "The New Yorker made it through Paris.";

        return `
          <section class="panel narrow center">
            <div class="eyebrow">Final score</div>
            <h2 class="section-title">${state.correctCount}/${scenarios.length}</h2>
            <p class="section-copy">
              ${endingText}
            </p>
            <div class="btn-row" style="justify-content:center; align-items:center;">
              <button class="btn btn-primary" data-action="start-scenarios">Start over</button>
            </div>
          </section>
        `;
      }

      function render() {
        setBackground();
        updateScore();

        let html = "";

        if (!state.dataLoaded) {
          html = loadingScreen();
        } else if (state.stage === "startup") {
          html = startupScreen();
        }
        else if (state.stage === "lesson1") html = lessonScreen(1);
        else if (state.stage === "lesson2") html = lessonScreen(2);
        else if (state.stage === "question") html = questionScreen();
        else if (state.stage === "result") html = resultScreen();
        else if (state.stage === "finished") html = finishedScreen();

        screen.innerHTML = html;
        wireScreenEvents();

        if (state.stage === "question") {
          startQuestionTimer();
        } else {
          stopQuestionTimer();
        }
      }

      function wireScreenEvents() {
        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const action = button.getAttribute("data-action");

            if (action === "go-main") {
              stopQuestionTimer();
              state.stage = "startup";
              state.scenarioIndex = 0;
              state.answeredCount = 0;
              state.correctCount = 0;
              state.answerInput = "";
              state.lastAnswerCorrect = false;
              render();
              return;
            }


            if (action === "start-scenarios") {
              startScenarios();
              return;
            }

            if (action === "go-lesson2") {
              state.stage = "lesson2";
              render();
              return;
            }

            if (action === "go-question") {
              state.stage = "question";
              render();
              return;
            }

            if (action === "next-scenario") {
              nextScenario();
              return;
            }

            if (action === "upload-video") {
              const input = document.getElementById("videoInput");
              if (input) input.click();
            }
          });
        });

        const input = document.getElementById("videoInput");
        if (input) {
          input.addEventListener("change", (event) => {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            if (state.videoUrl) URL.revokeObjectURL(state.videoUrl);
            state.videoUrl = URL.createObjectURL(file);
            render();
          });
        }

        const answerInput = document.getElementById("answerInput");
        if (answerInput) {
          answerInput.addEventListener("input", (event) => {
            const scenario = getCurrentScenario();
            if (!scenario) return;

            const expectedAnswer = getCorrectAnswer(scenario);
            const formattedAnswer = formatWithFrenchCharacters(event.target.value, expectedAnswer);
            if (formattedAnswer !== event.target.value) {
              event.target.value = formattedAnswer;
            }

            state.answerInput = formattedAnswer;
            if (isCorrectAnswer(state.answerInput, expectedAnswer)) {
              submitAnswer();
            }
          });
        }

        const form = document.getElementById("questionForm");
        if (form) {
          form.addEventListener("submit", (event) => {
            event.preventDefault();
            if (!state.answerInput.trim()) return;
            submitAnswer();
          });
        }
      }

      function validateScenarios(data) {
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error("db.json must contain a non-empty JSON array.");
        }

        const requiredFields = [
          "e-ok",
          "e-bad",
          "f-ok",
          "f-bad",
          "img-q-url",
          "img-bad-url",
          "img-ok-url",
        ];

        return data.map((item, index) => {
          if (!item || typeof item !== "object" || Array.isArray(item)) {
            throw new Error(`Scenario ${index + 1} must be a JSON object.`);
          }

          requiredFields.forEach((field) => {
            if (!(field in item)) {
              throw new Error(`Scenario ${index + 1} is missing "${field}".`);
            }
          });

          return {
            eOk: String(item["e-ok"]),
            eBad: String(item["e-bad"]),
            fOk: String(item["f-ok"]),
            fBad: String(item["f-bad"]),
            imgQUrl: String(item["img-q-url"]),
            imgBadUrl: String(item["img-bad-url"]),
            imgOkUrl: String(item["img-ok-url"]),
          };
        });
      }

      async function loadDatabase() {
        try {
          const response = await fetch("./db.json", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`db.json returned HTTP ${response.status}.`);
          }

          const data = await response.json();
          allScenarios = validateScenarios(data);
          scenarios = [...allScenarios];
          state.dataLoaded = true;
          state.dataError = "";
        } catch (error) {
          state.dataLoaded = false;
          state.dataError =
            `${error.message} Open the app through a local or web server so the browser can fetch db.json.`;
        }

        render();
      }

      render();
      loadDatabase();
    </script>
  </body>
</html>
