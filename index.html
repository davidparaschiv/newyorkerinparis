<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NewYorker in France</title>
</head>

<body>
<div id="screen"></div>

<script>

const BASE = "https://cdn.jsdelivr.net/gh/davidparaschiv/newyorkerinparis/";

let scenarios = [];

const state = {
  stage: "loading",
  scenarioIndex: 0,
  lessonOrder: null,
  answerInput: ""
};

function normalizeFrench(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[’]/g,"'")
    .replace(/\s+/g," ")
    .trim()
    .toLowerCase();
}

function getCurrent(){
  return scenarios[state.scenarioIndex];
}

function render(){

  const s = getCurrent();
  let html = "";

  if(state.stage === "loading"){
    html = "<h2>Loading...</h2>";
  }

  else if(state.stage === "lesson1" || state.stage === "lesson2"){

    const isFirst = state.stage === "lesson1";

    let en, fr;

    if(state.lessonOrder === "ok-first"){
      en = isFirst ? s.eOk : s.eBad;
      fr = isFirst ? s.fOk : s.fBad;
    } else {
      en = isFirst ? s.eBad : s.eOk;
      fr = isFirst ? s.fBad : s.fOk;
    }

    html = `
      <img width="400" src="${BASE + s.imgQ}">
      <h2>${en}</h2>
      <h3>${fr}</h3>
      <button onclick="nextLesson()">Next</button>
    `;
  }

  else if(state.stage === "question"){
    html = `
      <img width="400" src="${BASE + s.imgQ}">
      <input id="answer" placeholder="type french"/>
      <button onclick="submitAnswer()">Check</button>
    `;
  }

  else if(state.stage === "result"){

    const correct = normalizeFrench(state.answerInput) === normalizeFrench(s.fOk);

    html = `
      <img width="400" src="${BASE + (correct ? s.imgOk : s.imgBad)}">
      <h2>${correct ? "Correct" : "Wrong"}</h2>
      <p>Correct answer: ${s.fOk}</p>
      <button onclick="nextScenario()">Next</button>
    `;
  }

  document.getElementById("screen").innerHTML = html;
}

function nextLesson(){
  if(state.stage === "lesson1"){
    state.stage = "lesson2";
  } else {
    state.stage = "question";
  }
  render();
}

function submitAnswer(){
  state.answerInput = document.getElementById("answer").value;
  state.stage = "result";
  render();
}

function nextScenario(){
  state.scenarioIndex++;
  if(state.scenarioIndex >= scenarios.length){
    document.getElementById("screen").innerHTML = "<h2>Finished</h2>";
    return;
  }
  state.lessonOrder = Math.random() < 0.5 ? "ok-first" : "bad-first";
  state.stage = "lesson1";
  render();
}

async function load(){

  const res = await fetch("db.json");
  const data = await res.json();

  scenarios = data.map(item => ({
    eOk: item["e-ok"],
    fOk: item["f-ok"],
    eBad: item["e-bad"],
    fBad: item["f-bad"],
    imgQ: item["img-q-url"],
    imgBad: item["img-bad-url"],
    imgOk: item["img-ok-url"]
  }));

  state.lessonOrder = Math.random() < 0.5 ? "ok-first" : "bad-first";
  state.stage = "lesson1";

  render();
}

load();

</script>
</body>
</html>
